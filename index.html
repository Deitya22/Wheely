<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roda Putar Nomor | Retro Minimalis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="wheel-header">
            <h1>WHEEL OF FORTUNE</h1>
            <p class="tagline">putar & temukan angka mu</p>
        </div>

        <div class="wheel-area">
            <div class="canvas-wrapper">
                <canvas id="wheelCanvas" width="480" height="480"></canvas>
                <div class="pointer"></div>
            </div>
        </div>

        <div class="control-panel">
            <div class="custom-box">
                <label for="itemsInput">✎ daftar nomor (pisah koma)</label>
                <textarea id="itemsInput" rows="2" placeholder="1, 2, 3, 4, 5, 6, 7, 8"></textarea>
                <div class="button-group">
                    <button id="updateBtn" class="btn-update">⟳ perbarui roda</button>
                    <button id="spinBtn" class="btn-spin">🎲 PUTAR</button>
                </div>
            </div>
            <div class="result-card">
                <span class="result-label">hasil acak</span>
                <div class="result-value" id="resultDisplay">—</div>
            </div>
            <div class="retro-note">★ klik roda atau tombol putar</div>
        </div>
    </div>
    <script>
        (function(){
            // ---------- DOM elements ----------
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const itemsInput = document.getElementById('itemsInput');
            const updateBtn = document.getElementById('updateBtn');
            const spinBtn = document.getElementById('spinBtn');
            const resultDisplay = document.getElementById('resultDisplay');

            let segments = [];
            let currentRotation = 0;
            let animating = false;
            let animFrameId = null;
            let spinStartTime = 0;
            let spinDuration = 1600;
            let startRotation = 0;
            let targetRotation = 0;
            
            let width, height, centerX, centerY, radius;
            const POINTER_ANGLE = -Math.PI / 2;
            const defaultItems = ["1", "2", "3", "4", "5", "6", "7", "8"];
            
            function normalizeAngle(angle) {
                let norm = angle % (2 * Math.PI);
                if (norm < 0) norm += 2 * Math.PI;
                return norm;
            }
            
            // warna retro: palet merah, biru, putih, krem
            function getSegmentColor(index, total) {
                // menggunakan warna solid: merah, biru tua, merah muda, biru langit
                const colors = ["#c22b2b", "#2c5f8a", "#d64040", "#1e4b6e", "#b32d2d", "#3a7ca5"];
                return colors[index % colors.length];
            }
            
            function buildSegments(items) {
                const count = items.length;
                if (count === 0) return [];
                const angleStep = (2 * Math.PI) / count;
                const newSegments = [];
                let start = 0;
                for (let i = 0; i < count; i++) {
                    const end = start + angleStep;
                    newSegments.push({
                        label: items[i].trim() === "" ? "?" : items[i].trim(),
                        startAngle: start,
                        endAngle: end,
                        color: getSegmentColor(i, count)
                    });
                    start = end;
                }
                return newSegments;
            }
            
            function drawWheel() {
                if (!ctx) return;
                width = canvas.width;
                height = canvas.height;
                centerX = width / 2;
                centerY = height / 2;
                radius = Math.min(width, height) * 0.42;
                
                ctx.clearRect(0, 0, width, height);
                if (!segments.length) {
                    ctx.fillStyle = "#f0ede8";
                    ctx.fillRect(0, 0, width, height);
                    ctx.fillStyle = "#9e2d2d";
                    ctx.font = "bold 16px 'Courier New', monospace";
                    ctx.textAlign = "center";
                    ctx.fillText("⚠️ masukkan data", centerX, centerY);
                    return;
                }
                
                const rot = currentRotation % (2 * Math.PI);
                for (let i = 0; i < segments.length; i++) {
                    const seg = segments[i];
                    const start = seg.startAngle + rot;
                    const end = seg.endAngle + rot;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, start, end);
                    ctx.lineTo(centerX, centerY);
                    ctx.fillStyle = seg.color;
                    ctx.fill();
                    ctx.strokeStyle = "#fcf9f0";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, start, end);
                    ctx.lineTo(centerX, centerY);
                    ctx.stroke();
                }
                
                // lingkaran tengah
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius * 0.12, 0, 2 * Math.PI);
                ctx.fillStyle = "#f8ede0";
                ctx.fill();
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius * 0.08, 0, 2 * Math.PI);
                ctx.fillStyle = "#bf3a2e";
                ctx.fill();
                
                // teks segmen
                ctx.font = `bold ${Math.max(11, Math.floor(radius * 0.08))}px "Courier New", monospace`;
                ctx.fillStyle = "#f9f2e2";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                const textRadius = radius * 0.7;
                for (let i = 0; i < segments.length; i++) {
                    const seg = segments[i];
                    const midAngle = seg.startAngle + (seg.endAngle - seg.startAngle) / 2 + rot;
                    const x = centerX + Math.cos(midAngle) * textRadius;
                    const y = centerY + Math.sin(midAngle) * textRadius;
                    let label = seg.label;
                    if (label.length > 10) label = label.slice(0, 8) + "..";
                    ctx.fillStyle = "#fff6e8";
                    ctx.fillText(label, x, y);
                }
                
                // garis tepi retro
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius + 4, 0, 2 * Math.PI);
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#c5312b";
                ctx.stroke();
            }
            
            function getCurrentWinnerSegment(rotationRad) {
                if (!segments.length) return null;
                let localPointer = normalizeAngle(POINTER_ANGLE - rotationRad);
                for (let seg of segments) {
                    if (localPointer >= seg.startAngle && localPointer < seg.endAngle) return seg;
                }
                return segments[0];
            }
            
            function updateResultFromRotation() {
                const winner = getCurrentWinnerSegment(currentRotation);
                if (winner) resultDisplay.innerText = winner.label;
                else resultDisplay.innerText = "?";
            }
            
            function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
            
            function animateSpin(now) {
                const elapsed = now - spinStartTime;
                let t = Math.min(1, elapsed / spinDuration);
                const ease = easeOutCubic(t);
                currentRotation = startRotation + (targetRotation - startRotation) * ease;
                drawWheel();
                if (t < 1) {
                    animFrameId = requestAnimationFrame(animateSpin);
                } else {
                    currentRotation = targetRotation;
                    drawWheel();
                    animating = false;
                    spinBtn.disabled = false;
                    updateBtn.disabled = false;
                    updateResultFromRotation();
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                }
            }
            
            function spinWheel() {
                if (animating) return;
                if (!segments.length) {
                    resultDisplay.innerText = "update data!";
                    return;
                }
                const randomIndex = Math.floor(Math.random() * segments.length);
                const targetSegment = segments[randomIndex];
                const segStart = targetSegment.startAngle;
                const segEnd = targetSegment.endAngle;
                const randomOffset = Math.random() * (segEnd - segStart);
                const targetLocalAngle = segStart + randomOffset;
                let rawFinalRot = POINTER_ANGLE - targetLocalAngle;
                let finalRotMod = normalizeAngle(rawFinalRot);
                const fullTurns = 5 + Math.floor(Math.random() * 6);
                const deltaFull = fullTurns * 2 * Math.PI;
                let targetAbsolute = currentRotation + deltaFull + finalRotMod;
                startRotation = currentRotation;
                targetRotation = targetAbsolute;
                animating = true;
                spinBtn.disabled = true;
                updateBtn.disabled = true;
                spinStartTime = performance.now();
                animFrameId = requestAnimationFrame(animateSpin);
            }
            
            function updateWheelFromInput() {
                if (animating) {
                    if (animFrameId) cancelAnimationFrame(animFrameId);
                    animating = false;
                    spinBtn.disabled = false;
                    updateBtn.disabled = false;
                }
                let raw = itemsInput.value;
                let itemsArray = [];
                if (raw.trim() === "") itemsArray = [...defaultItems];
                else {
                    let parts = raw.split(',').map(p => p.trim()).filter(p => p !== "");
                    if (parts.length < 2) {
                        alert("minimal 2 item! menggunakan default");
                        itemsArray = [...defaultItems];
                    } else itemsArray = parts;
                }
                segments = buildSegments(itemsArray);
                currentRotation = 0;
                drawWheel();
                updateResultFromRotation();
                itemsInput.value = itemsArray.join(", ");
            }
            
            function init() {
                itemsInput.value = defaultItems.join(", ");
                updateWheelFromInput();
                canvas.addEventListener('click', () => { if(!animating && segments.length) spinWheel(); });
                updateBtn.addEventListener('click', () => { if(!animating) updateWheelFromInput(); });
                spinBtn.addEventListener('click', () => { if(!animating && segments.length) spinWheel(); });
                window.addEventListener('resize', () => drawWheel());
            }
            init();
        })();
    </script>
</body>
</html>
